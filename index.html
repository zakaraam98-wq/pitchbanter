<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchBanter | Sports News & Gear</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { light: '#10b981', DEFAULT: '#059669', dark: '#047857' },
                        dark: { bg: '#0f172a', card: '#1e293b' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-dark-bg dark:text-gray-100 antialiased">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 w-full bg-white/80 dark:bg-dark-bg/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                    <i class="fa-solid fa-bolt text-brand text-2xl"></i>
                    <span class="font-bold text-2xl tracking-tight">Pitch<span class="text-brand">Banter</span></span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="#news-section" class="text-gray-700 dark:text-gray-300 hover:text-brand font-semibold transition-colors">News</a>
                    <a href="#news-section" class="text-gray-700 dark:text-gray-300 hover:text-brand font-semibold transition-colors">Analysis</a>
                    <a href="#news-section" class="text-gray-700 dark:text-gray-300 hover:text-brand font-semibold transition-colors">Transfers</a>
                    <a href="#news-section" class="bg-brand hover:bg-brand-dark text-white px-4 py-2 rounded-full font-bold shadow-lg">
                        <i class="fa-solid fa-cart-shopping mr-2"></i>Gear
                    </a>
                    <a href="https://www.facebook.com/share/g/1953fhgAhm/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" class="text-blue-600 dark:text-blue-400 font-bold flex items-center gap-1">
                        <i class="fa-brands fa-facebook text-xl"></i> Join 41K+ Fans
                    </a>
                    <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                        <i class="fa-solid fa-moon text-gray-600 dark:text-gray-300" id="themeIcon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 mb-16">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-white dark:bg-dark-card rounded-3xl overflow-hidden shadow-xl border border-gray-100 dark:border-gray-800">
            <div class="p-8 md:p-12">
                <span class="inline-block px-3 py-1 mb-4 rounded-full bg-brand/10 text-brand font-bold text-sm">Featured Report</span>
                <h1 class="text-3xl md:text-5xl font-extrabold mb-4 leading-tight">Welcome to PitchBanter Community</h1>
                <p class="text-gray-600 dark:text-gray-400 mb-8 text-lg">Check out our latest post below directly updated from the Admin Panel.</p>
            </div>
            <div class="h-64 md:h-full bg-slate-900 flex items-center justify-center">
                <i class="fa-solid fa-soccer-ball text-9xl text-brand/20 animate-spin" style="animation-duration: 10s;"></i>
            </div>
        </div>
    </header>

    <!-- Dynamic News Section -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-20" id="news-section">
        <div class="flex justify-between items-end mb-8 border-b border-gray-200 dark:border-gray-800 pb-4">
            <h2 class="text-2xl md:text-3xl font-bold flex items-center">
                <i class="fa-solid fa-fire text-orange-500 mr-3"></i> Latest News & Gear From Admin
            </h2>
        </div>

        <!-- Halkaan waxaa ku soo dhacaya posts-ka aad ka soo qorto Admin Panel-ka -->
        <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-12 text-gray-500">
                <i class="fa-solid fa-spinner animate-spin text-3xl text-brand mb-4"></i>
                <p>Loading latest posts from GitHub...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Dark Mode
            const themeToggleBtn = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const htmlElement = document.documentElement;
            
            themeToggleBtn.addEventListener('click', () => {
                htmlElement.classList.toggle('dark');
                const isDark = htmlElement.classList.contains('dark');
                themeIcon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
            });

            // MISHIINKA KEEKENAYA POSTS-KA GUDAHA GITHUB
            const repo = "zakaraam98-wq/pitchbanter";
            const container = document.getElementById('posts-container');

            // Waxaan ka soo aqrinaynaa API-ga GitHub galka posts-ka
            fetch(`https://api.github.com/repos/${repo}/contents/_posts`)
                .then(res => {
                    if(!res.ok) throw new Error("No posts found");
                    return res.json();
                })
                .then(files => {
                    container.innerHTML = ""; // Clear loading
                    
                    // Mid mid u soo qaad feyl kasta oo qoraal ah
                    files.forEach(file => {
                        fetch(file.download_url)
                            .then(r => r.text())
                            .then(text => {
                                // Dynamic Card Creator
                                const card = document.createElement('article');
                                card.className = "bg-white dark:bg-dark-card rounded-2xl overflow-hidden shadow-md p-6 border border-gray-100 dark:border-gray-800 flex flex-col";
                                
                                // Fududayn qoraalka ah (Kaliya tijaabo ahaan)
                                card.innerHTML = `
                                    <div class="mb-2"><span class="bg-brand/10 text-brand text-xs font-bold px-2 py-1 rounded">Post</span></div>
                                    <h3 class="text-xl font-bold mb-2 text-emerald-600">${file.name.replace('.md', '').replaceAll('-', ' ')}</h3>
                                    <p class="text-gray-600 dark:text-gray-400 text-sm mb-4 line-clamp-4">${text.substring(0, 250)}...</p>
                                    <a href="${file.html_url}" target="_blank" class="mt-auto text-sm font-bold text-brand hover:underline">Read full code on GitHub →</a>
                                `;
                                container.appendChild(card);
                            });
                    });
                })
                .catch(err => {
                    container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">No posts found yet. Go to <a href="/admin/" class="text-brand underline">Admin Panel</a> and create your first post!</div>`;
                });
        });
    </script>
</body>
</html>
